# Mixin EdTech UZ — инфраструктура для разработки.
#
# Запуск:    docker compose up -d
# Остановка: docker compose down
# С данными: docker compose down -v   (удалит volumes!)
#
# По умолчанию поднимает:
#   - postgres   :5432
#   - redis      :6379
#   - ai-service :8000   (Python FastAPI)
#
# Node-сервисы (api / analytics / integrations) и фронты запускаются локально
# через `pnpm dev`. Это сделано специально — turbo watch + vite HMR на хосте
# работают быстрее чем через bind-mount в контейнере.

services:
  postgres:
    image: postgres:16-alpine
    container_name: mixin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mixin}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mixin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mixin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Qdrant: векторная БД для RAG-индекса учебников.
  # Наполняется через scripts/process_textbooks.py.
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: mixin-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + Web UI (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  ai-service:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: mixin-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Внутри контейнера Redis доступен по имени сервиса
      REDIS_URL: redis://redis:6379
    volumes:
      - ./services/ai:/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
