upstream api {
    server api:3001;
}

upstream ai_service {
    server ai:8000;
}

upstream analytics {
    server analytics:3002;
}

upstream student_app {
    server student:3100;
}

upstream parent_app {
    server parent:3200;
}

upstream school_app {
    server school:3300;
}

upstream admin_app {
    server admin:3400;
}

server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai/ {
        proxy_pass http://ai_service/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /analytics/ {
        proxy_pass http://analytics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /student/ {
        proxy_pass http://student_app;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
    }

    location /parent/ {
        proxy_pass http://parent_app;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
    }

    location /school/ {
        proxy_pass http://school_app;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
    }

    location /admin/ {
        proxy_pass http://admin_app;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
    }
}
