apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: edtech-uz
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: edtech-uz/api:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: edtech-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: edtech-uz
spec:
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001
