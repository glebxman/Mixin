server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — все маршруты роутит React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кешируем статику
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
